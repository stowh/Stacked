syntax = "proto3";

package userv1;

option go_package = "./userv1";

message SearchByIdRequest {
  
}
message SearchByUsernameRequest {
  
}

message Rspn {
  bool ok = 1;
}
message Account {
  int64 authId = 1;
  string first_name = 2;
  string last_name = 3;
  string username = 4;
  string role = 5;
}

service User {
  rpc CreateProfile(Account) returns (Rspn);
  rpc PutProfile(Account) returns (Rspn);
  rpc SearchById(SearchByIdRequest) returns (Account);
  rpc SearchByUsername(SearchByUsernameRequest) returns (Account);
}
